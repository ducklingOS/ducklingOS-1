name: Build ducklingOS 1 x64 (Limine Bootloader)
on: 
  push:
    branches: [ main ]

jobs:
  build-os:
    runs-on: ubuntu-latest
    steps:
    - name: Code aus GitHub auschecken
      uses: actions/checkout@v4

    - name: Bau-Werkzeuge installieren
      run: |
        sudo apt-get update
        sudo apt-get install -y squashfs-tools xorriso genisoimage isolinux syslinux-common rsync wget mtools gcc make

    - name: Minimales RootFS via Docker erstellen
      run: |
        mkdir -p build/squashfs/rootfs build/iso/casper
        sudo docker run --name duckling_base ubuntu:24.04 /bin/true
        sudo docker export duckling_base | sudo tar -C build/squashfs/rootfs -xf -
        sudo docker rm duckling_base

    - name: ducklingOS Branding einspielen
      run: |
        sudo cp lsb-release build/squashfs/rootfs/etc/lsb-release
        sudo cp os-release build/squashfs/rootfs/etc/os-release
        sudo mkdir -p build/squashfs/rootfs/usr/share/backgrounds/duckling/
        sudo cp duckling_wallpaper.jpg build/squashfs/rootfs/usr/share/backgrounds/duckling/default.jpg
        sudo mkdir -p build/squashfs/rootfs/etc/skel/.config/
        if [ -d "skel/.config" ]; then sudo cp -r skel/.config/* build/squashfs/rootfs/etc/skel/.config/; fi

    - name: Live-System konfigurieren & KDE Plasma installieren
      run: |
        sudo mount --bind /dev build/squashfs/rootfs/dev
        sudo mount --bind /proc build/squashfs/rootfs/proc
        sudo mount --bind /sys build/squashfs/rootfs/sys

        sudo cp /etc/resolv.conf build/squashfs/rootfs/etc/resolv.conf
        sudo chroot build/squashfs/rootfs apt-get update
        
        sudo DEBIAN_FRONTEND=noninteractive chroot build/squashfs/rootfs apt-get install -y --no-install-recommends linux-image-generic initramfs-tools live-boot casper
        sudo DEBIAN_FRONTEND=noninteractive chroot build/squashfs/rootfs apt-get install -y kubuntu-desktop calamares sddm dbus-x11

        sudo chroot build/squashfs/rootfs useradd -m -s /bin/bash -g sudo duckling
        sudo chroot build/squashfs/rootfs passwd -d duckling

        sudo umount build/squashfs/rootfs/dev
        sudo umount build/squashfs/rootfs/proc
        sudo umount build/squashfs/rootfs/sys

    - name: Neue ducklingOS ISO verpacken (BIOS + UEFI via Limine)
      run: |
        # SquashFS Dateisystem komprimieren
        sudo mksquashfs build/squashfs/rootfs build/iso/casper/filesystem.squashfs -comp xz
        
        # Kernel und Initrd extrahieren
        sudo cp $(ls -v build/squashfs/rootfs/boot/vmlinuz-* | tail -n 1) build/iso/casper/vmlinuz
        sudo cp $(ls -v build/squashfs/rootfs/boot/initrd.img-* | tail -n 1) build/iso/casper/initrd
        
        # Wir klonen das offizielle Repository und bauen das Tool direkt aus dem Quellcode!
        git clone https://github.com/limine-bootloader/limine.git --branch=v7.x-binary --depth=1
        
        # Kompiliert das offizielle All-in-One-Werkzeug live auf dem Server (dauert < 5 Sekunden)
        make -C limine

        # Dateien in die ISO-Struktur einpflegen
        mkdir -p build/iso/boot/limine
        cp limine/limine-bios-cd.bin build/iso/boot/limine/
        cp limine/limine-bios.sys build/iso/boot/limine/
        cp limine/limine-uefi-cd.bin build/iso/boot/limine/
        
        mkdir -p build/iso/EFI/BOOT
        cp limine/BOOTX64.EFI build/iso/EFI/BOOT/
        cp limine/BOOTIA32.EFI build/iso/EFI/BOOT/

        # Limine-Konfigurationsdatei schreiben
        echo -e "timeout: 5\n\n:ducklingOS 1 Starten\n    protocol: linux\n    kernel_path: boot:///casper/vmlinuz\n    initrd_path: boot:///casper/initrd\n    cmdline: boot=casper quiet splash ---" > build/iso/boot/limine/limine.conf
        # Kopie für UEFI-Boot unter EFI/BOOT/
        cp build/iso/boot/limine/limine.conf build/iso/EFI/BOOT/limine.conf
        # Kopie im Root für maximale Kompatibilität
        cp build/iso/boot/limine/limine.conf build/iso/limine.conf

        # Rechte für xorriso freigeben
        sudo chmod -R 755 build/

    - name: ISO erstellen mit xorriso
      run: |
        sudo xorriso -as mkisofs \
          -J -r -V "ducklingOS 1" \
          -eltorito-boot boot/limine/limine-bios-cd.bin \
          -no-emul-boot -boot-load-size 4 -boot-info-table \
          -eltorito-alt-boot -eltorito-boot boot/limine/limine-uefi-cd.bin \
          -no-emul-boot \
          -o ducklingOS_1_x64.iso \
          build/iso

    - name: ISO als Download bereitstellen
      uses: actions/upload-artifact@v4
      with:
        name: ducklingOS-1-ISO
        path: ducklingOS_1_x64.iso

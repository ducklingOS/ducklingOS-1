name: Build ducklingOS 1 x64
on: 
  push:
    branches: [ main ]

jobs:
  build-os:
    runs-on: ubuntu-latest
    steps:
    - name: Code aus GitHub auschecken
      uses: actions/checkout@v4

    - name: Bau-Werkzeuge installieren
      run: |
        sudo apt-get update
        sudo apt-get install -y squashfs-tools xorriso genisoimage wget isolinux syslinux-common

    - name: Minimales RootFS vorbereiten
      run: |
        mkdir -p build/squashfs/rootfs build/iso/casper
        # Wir laden das offizielle, stabile Ubuntu Base Tarball herunter
        wget http://ubuntu.com
        # Entpacken in das Zielverzeichnis
        sudo tar -xzf ubuntu-base-24.04-base-amd64.tar.gz -C build/squashfs/rootfs/

    - name: ducklingOS Branding einspielen
      run: |
        sudo cp lsb-release build/squashfs/rootfs/etc/lsb-release
        sudo cp os-release build/squashfs/rootfs/etc/os-release
        sudo mkdir -p build/squashfs/rootfs/usr/share/backgrounds/duckling/
        sudo cp duckling_wallpaper.jpg build/squashfs/rootfs/usr/share/backgrounds/duckling/default.jpg
        sudo mkdir -p build/squashfs/rootfs/etc/skel/.config/
        if [ -d "skel/.config" ]; then sudo cp -r skel/.config/* build/squashfs/rootfs/etc/skel/.config/; fi

    - name: Live-System konfigurieren & KDE Plasma installieren
      run: |
        sudo mount --bind /dev build/squashfs/rootfs/dev
        sudo mount --bind /proc build/squashfs/rootfs/proc
        sudo mount --bind /sys build/squashfs/rootfs/sys

        # DNS-Server kopieren, damit das virtuelle System Internetzugriff hat
        sudo cp /etc/resolvconf/resolv.conf.d/base build/squashfs/rootfs/etc/resolv.conf || sudo cp /etc/resolv.conf build/squashfs/rootfs/etc/resolv.conf

        # Paketquellen aktualisieren und System vorbereiten
        sudo chroot build/squashfs/rootfs apt-get update
        
        # Desktop, Kernel und Live-Boot-Komponenten installieren
        sudo DEBIAN_FRONTEND=noninteractive chroot build/squashfs/rootfs apt-get install -y linux-image-generic initramfs-tools kubuntu-desktop calamares sddm live-boot casper dbus-x11

        # Live-Benutzer duckling einrichten
        sudo chroot build/squashfs/rootfs useradd -m -s /bin/bash -g sudo duckling
        sudo chroot build/squashfs/rootfs passwd -d duckling

        sudo umount build/squashfs/rootfs/dev
        sudo umount build/squashfs/rootfs/proc
        sudo umount build/squashfs/rootfs/sys

    - name: Neue ducklingOS ISO verpacken
      run: |
        # Komprimiert das Dateisystem
        sudo mksquashfs build/squashfs/rootfs build/iso/casper/filesystem.squashfs -comp xz
        
        # Kopiert die Boot-Dateien (Kernel) an die richtige Stelle für die ISO
        mkdir -p build/iso/isolinux
        sudo cp build/squashfs/rootfs/boot/vmlinuz* build/iso/casper/vmlinuz
        sudo cp build/squashfs/rootfs/boot/initrd* build/iso/casper/initrd
        sudo cp /usr/lib/ISOLINUX/isolinux.bin build/iso/isolinux/
        sudo cp /usr/lib/syslinux/modules/bios/ldlinux.c32 build/iso/isolinux/
        
        echo -e "default duckling\nlabel duckling\n  kernel /casper/vmlinuz\n  append initrd=/casper/initrd boot=casper quiet splash ---" > build/iso/isolinux/isolinux.cfg

        # Generiert die bootbare ISO
        xorriso -as mkisofs -r -V "ducklingOS 1" \
          -o ducklingOS_1_x64.iso \
          -J -joliet-long -b isolinux/isolinux.bin \
          -c isolinux/boot.cat -no-emul-boot \
          -boot-load-size 4 -boot-info-table build/iso

    - name: ISO als Download bereitstellen
      uses: actions/upload-artifact@v4
      with:
        name: ducklingOS-1-ISO
        path: ducklingOS_1_x64.iso
